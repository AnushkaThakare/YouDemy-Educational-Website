<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register | Youdemi</title>
  <link rel="shortcut icon" href="./favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="./assets/font/font.css">
  <link rel="stylesheet" href="./assets/css/style.css">
</head>

<body>

  <!-- HEADER -->
  <header class="header" data-header>
    <div class="container">
      <a href="index.html" class="logo">
        <img src="./assets/images/logo.svg" width="145" height="27" alt="Youdemi home">
      </a>

      <nav class="navbar" data-navbar>
        <ul class="navbar-list">
          <li class="navbar-item"><a href="index.html" class="navbar-link title-sm">Home</a></li>
          <li class="navbar-item"><a href="courses.html" class="navbar-link title-sm">Courses</a></li>
          <li class="navbar-item"><a href="blog.html" class="navbar-link title-sm">Blog</a></li>
          <li class="navbar-item"><a href="contact.html" class="navbar-link title-sm">Contact</a></li>
        </ul>
      </nav>

      <a href="register.html" class="btn btn-secondary">Start Free Trial</a>
      <button class="nav-open-btn" aria-label="open menu" data-nav-toggler>
        <ion-icon name="menu-outline"></ion-icon>
      </button>
      <div class="overlay" data-overlay data-nav-toggler></div>
    </div>
  </header>

  <!-- REGISTER SECTION -->
  <main>
    <section class="section register">
      <div class="container">
        <div class="form-wrapper">

          <h2 class="headline-md section-title text-center">Create Your Account</h2>
          <p class="title-sm text-center">Join Youdemi and start learning today!</p>

          <form id="registerForm" class="form">
            <div class="input-group">
              <label for="name" class="title-sm">Full Name</label>
              <input type="text" name="name" id="name" placeholder="Enter your full name" required>
            </div>

            <div class="input-group">
              <label for="email" class="title-sm">Email Address</label>
              <input type="email" name="email" id="email" placeholder="Enter your email" required>
            </div>

            <div class="input-group">
              <label for="password" class="title-sm">Password</label>
              <input type="password" name="password" id="password" placeholder="Enter your password" required>
            </div>

            <div class="form-footer">
              <button type="submit" class="btn btn-primary">Register</button>
              <p class="title-sm">Already have an account? <a href="login.html">Login Here</a></p>
            </div>
          </form>

        </div>
      </div>
    </section>
  </main>

  <!-- FOOTER -->
  <footer class="footer has-bg-image" style="background-image: url('./assets/images/footer-bg.png')">
    <div class="footer-bottom">
      <div class="container">
        <p class="copyright">© Copyright 2025 | Youdemi | All Rights Reserved</p>
      </div>
    </div>
  </footer>

  <!-- SCRIPTS -->
  <script src="./assets/js/script.js"></script>

  <!-- ✅ Corrected Registration JS (no server needed) -->
  <script>
    const registerForm = document.querySelector('#registerForm');
    registerForm.addEventListener('submit', (e) => {
      e.preventDefault();
      const name = document.querySelector('#name').value.trim();
      const email = document.querySelector('#email').value.trim();
      const password = document.querySelector('#password').value.trim();

      // Store user data in localStorage
      let users = JSON.parse(localStorage.getItem('users')) || [];

      // Check if user already exists
      const exists = users.some(user => user.email === email);
      if (exists) {
        alert('User already exists with this email!');
        return;
      }

      users.push({ name, email, password });
      localStorage.setItem('users', JSON.stringify(users));

      alert('Registration successful! You can now login.');
      window.location.href = 'login.html';
    });
  </script>

  <script type="module" src="https://unpkg.com/ionicons@5.5.2/dist/ionicons/ionicons.esm.js"></script>
  <script nomodule src="https://unpkg.com/ionicons@5.5.2/dist/ionicons/ionicons.js"></script>

</body>
</html>
