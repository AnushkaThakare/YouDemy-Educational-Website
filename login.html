<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Login | Youdemi</title>
  <link rel="shortcut icon" href="./favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="./assets/font/font.css">
  <link rel="stylesheet" href="./assets/css/style.css">
</head>

<body>

  <!-- HEADER -->
  <header class="header" data-header>
    <div class="container">
      <a href="index.html" class="logo">
        <img src="./assets/images/logo.svg" width="145" height="27" alt="Youdemi home">
      </a>

      <nav class="navbar" data-navbar>
        <ul class="navbar-list">
          <li class="navbar-item"><a href="index.html" class="navbar-link title-sm">Home</a></li>
          <li class="navbar-item"><a href="courses.html" class="navbar-link title-sm">Courses</a></li>
          <li class="navbar-item"><a href="blog.html" class="navbar-link title-sm">Blog</a></li>
          <li class="navbar-item"><a href="contact.html" class="navbar-link title-sm">Contact</a></li>
        </ul>
      </nav>

      <a href="register.html" class="btn btn-secondary">Start Free Trial</a>
      <button class="nav-open-btn" aria-label="open menu" data-nav-toggler>
        <ion-icon name="menu-outline"></ion-icon>
      </button>
      <div class="overlay" data-overlay data-nav-toggler></div>
    </div>
  </header>

  <!-- LOGIN SECTION -->
  <main>
    <section class="section login">
      <div class="container">
        <div class="form-wrapper">

          <h2 class="headline-md section-title text-center">Login to Your Account</h2>
          <p class="title-sm text-center">Welcome back! Please enter your details.</p>

          <form id="loginForm" class="form">
            <div class="input-group">
              <label for="email" class="title-sm">Email Address</label>
              <input type="email" name="email" id="email" placeholder="Enter your email" required>
            </div>

            <div class="input-group">
              <label for="password" class="title-sm">Password</label>
              <input type="password" name="password" id="password" placeholder="Enter your password" required>
            </div>

            <div class="form-footer">
              <button type="submit" class="btn btn-primary">Login</button>
              <p class="title-sm">Don't have an account? <a href="register.html">Register Here</a></p>
            </div>
          </form>

        </div>
      </div>
    </section>
  </main>

  <!-- FOOTER -->
  <footer class="footer has-bg-image" style="background-image: url('./assets/images/footer-bg.png')">
    <div class="footer-bottom">
      <div class="container">
        <p class="copyright">© Copyright 2025 | Youdemi | All Rights Reserved</p>
      </div>
    </div>
  </footer>

  <script src="./assets/js/script.js"></script>

  <!-- ✅ Added Login Logic (no server needed) -->
  <script>
    const loginForm = document.querySelector('#loginForm');
    loginForm.addEventListener('submit', (e) => {
      e.preventDefault();
      const email = document.querySelector('#email').value.trim();
      const password = document.querySelector('#password').value.trim();

      // Retrieve users from localStorage
      const users = JSON.parse(localStorage.getItem('users')) || [];

      // Check credentials
      const user = users.find(user => user.email === email && user.password === password);

      if (user) {
        alert(`Welcome back, ${user.name}! Login successful.`);
        window.location.href = 'index.html'; // redirect to home after login
      } else {
        alert('Invalid email or password!');
      }
    });
  </script>

  <script type="module" src="https://unpkg.com/ionicons@5.5.2/dist/ionicons/ionicons.esm.js"></script>
  <script nomodule src="https://unpkg.com/ionicons@5.5.2/dist/ionicons/ionicons.js"></script>

</body>
</html>
